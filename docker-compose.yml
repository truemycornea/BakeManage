services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bakemanage
      POSTGRES_PASSWORD: bakemanage
      POSTGRES_DB: bakemanage
    volumes:
      - bakemanage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakemanage -d bakemanage"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: bakemanage:sandbox
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      SERVICE: api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: bakemanage:sandbox
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      SERVICE: worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/lucide.min.js:/usr/share/nginx/html/lucide.min.js:ro
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  bakemanage_pgdata:
