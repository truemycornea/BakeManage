server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/css application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # Proxy all /api/* calls to the FastAPI backend
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Forward Authentik SSO headers (populated by NPM + Authentik Outpost on Olympus platform)
        proxy_set_header   X-Auth-Request-User   $http_x_auth_request_user;
        proxy_set_header   X-Auth-Request-Email  $http_x_auth_request_email;
        proxy_set_header   X-Auth-Request-Groups $http_x_auth_request_groups;
        proxy_read_timeout 90s;
        proxy_buffering    off;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
