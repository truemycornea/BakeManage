<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BakeManage — ERP Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sb:240px;
  --sb-bg:#0F172A;
  --sb-hover:rgba(255,255,255,.05);
  --sb-active:rgba(245,158,11,.12);
  --sb-text:#94A3B8;
  --sb-active-text:#F59E0B;
  --accent:#F59E0B;
  --accent-d:#D97706;
  --accent-dd:#B45309;
  --bg:#F1F5F9;
  --surface:#FFFFFF;
  --border:#E2E8F0;
  --text:#0F172A;
  --muted:#64748B;
  --faint:#94A3B8;
  --ok:#059669;
  --ok-bg:#ECFDF5;
  --ok-br:#A7F3D0;
  --warn:#D97706;
  --warn-bg:#FFFBEB;
  --warn-br:#FDE68A;
  --err:#DC2626;
  --err-bg:#FEF2F2;
  --err-br:#FECACA;
  --info:#2563EB;
  --info-bg:#EFF6FF;
  --info-br:#BFDBFE;
  --r:8px;
  --rl:12px;
  --sh:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06);
  --sh-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:13.5px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden}

/* ── APP SHELL ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sb);min-width:var(--sb);background:var(--sb-bg);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── SIDEBAR ── */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#F59E0B,#B45309);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;letter-spacing:-.5px;flex-shrink:0}
.sb-name{font-size:15px;font-weight:700;color:#F8FAFC;letter-spacing:-.3px;line-height:1.2}
.sb-ver{font-size:10px;color:#475569;margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
.sb-sec{font-size:10px;font-weight:600;color:#334155;letter-spacing:.8px;text-transform:uppercase;padding:12px 8px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;color:var(--sb-text);font-size:13px;font-weight:500;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--sb-hover);color:#CBD5E1}
.nav-item.active{background:var(--sb-active);color:var(--sb-active-text)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.sb-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,.06)}
.user-pill{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;background:rgba(255,255,255,.04);cursor:pointer}
.user-pill:hover{background:rgba(255,255,255,.07)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#F59E0B,#D97706);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-role{font-size:12px;font-weight:600;color:#E2E8F0;text-transform:capitalize}
.user-sub{font-size:10.5px;color:#475569}
.signout-btn{color:#475569;cursor:pointer;transition:color .15s}
.signout-btn:hover{color:var(--err)}

/* ── HEADER ── */
.header{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:6px}
.bc-root{font-size:12.5px;color:var(--muted)}
.bc-sep{color:var(--faint);font-size:12px}
.bc-curr{font-size:13.5px;font-weight:600;color:var(--text)}
.header-right{display:flex;align-items:center;gap:14px}
.api-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ok)}
.dot.off{background:var(--err);animation:none!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dot{animation:pulse 2.5s infinite}
.dot-label{font-size:11.5px;font-weight:500;color:var(--muted)}
.docs-link{font-size:12px;font-weight:500;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);transition:all .15s}
.docs-link:hover{color:var(--accent-d);border-color:var(--accent)}
.docs-link svg{width:13px;height:13px}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:24px}
.page-hd{margin-bottom:22px}
.page-title{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.4px;margin-bottom:4px}
.page-desc{font-size:13px;color:var(--muted);line-height:1.5}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-size:13.5px;font-weight:600;color:var(--text)}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.card-bd{padding:18px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:var(--sh)}
.stat-lbl{font-size:11.5px;font-weight:500;color:var(--muted)}
.stat-val{font-size:22px;font-weight:700;color:var(--text);margin-top:5px;letter-spacing:-.5px;line-height:1}
.stat-hint{font-size:11px;color:var(--faint);margin-top:4px}
.ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{width:16px;height:16px}
.ico-amber{background:#FEF3C7;color:#D97706}
.ico-green{background:#DCFCE7;color:#16A34A}
.ico-blue{background:#DBEAFE;color:#2563EB}
.ico-purple{background:#EDE9FE;color:#7C3AED}
.ico-slate{background:#F1F5F9;color:#475569}

/* ── CAPABILITY GRID ── */
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cap-item{display:flex;gap:12px;padding:13px;border:1px solid var(--border);border-radius:8px;align-items:flex-start}
.cap-text .cap-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.cap-text .cap-desc{font-size:11.5px;color:var(--muted);line-height:1.5}

/* ── QUICK ACTIONS ── */
.qa-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.qa-btn{display:flex;align-items:center;gap:7px;padding:9px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text);transition:all .15s;box-shadow:var(--sh)}
.qa-btn:hover{border-color:var(--accent-d);color:var(--accent-d);background:#FFFBEB}
.qa-btn svg{width:14px;height:14px}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11.5px;font-weight:600;color:var(--text);margin-bottom:5px}
.form-hint{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
.form-input,.form-select{width:100%;height:36px;padding:0 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:var(--surface);outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.form-input:focus,.form-select:focus{border-color:var(--accent-d);box-shadow:0 0 0 3px rgba(217,119,6,.1)}
.form-input::placeholder{color:var(--faint)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:35px;padding:0 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;outline:none;transition:all .15s;font-family:inherit;user-select:none;white-space:nowrap}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-primary{background:var(--accent-d);color:#fff}
.btn-primary:hover{background:var(--accent-dd)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg);border-color:#CBD5E1}
.btn-secondary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:0 8px}
.btn-ghost:hover{color:var(--text)}
.btn-sm{height:29px;padding:0 10px;font-size:12px}
.btn-lg{height:42px;padding:0 22px;font-size:14px;border-radius:8px}
.btn-full{width:100%}

/* ── UPLOAD ZONE ── */
.drop-zone{border:2px dashed var(--border);border-radius:var(--r);padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent-d);background:#FFFBEB}
.drop-zone input[type="file"]{display:none}
.dz-icon{color:var(--faint);margin-bottom:10px}
.dz-icon svg{width:34px;height:34px}
.dz-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:3px}
.dz-sub{font-size:12px;color:var(--muted)}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:var(--accent-d);border-bottom-color:var(--accent-d);font-weight:600}
.tab:hover:not(.active){color:var(--text)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-br)}
.badge-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-br)}
.badge-err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-br)}
.badge-info{background:var(--info-bg);color:var(--info);border:1px solid var(--info-br)}
.badge-neutral{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}

/* ── PROGRESS ── */
.prog-bg{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .6s ease}
.prog-green{background:var(--ok)}
.prog-amber{background:var(--accent)}
.prog-red{background:var(--err)}

/* ── LAYOUT HELPERS ── */
.two-col{display:grid;grid-template-columns:1fr 340px;gap:20px}
.col-stack{display:flex;flex-direction:column;gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.divider{border-bottom:1px solid var(--border);margin:16px 0}
.kv{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:12px}
.kv:last-child{border-bottom:none}
.kv-key{font-size:12.5px;color:var(--muted)}
.kv-val{font-size:13px;font-weight:600;color:var(--text)}
code{font-size:11.5px;background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:4px;font-family:ui-monospace,monospace;color:var(--text)}

/* ── SPINNER ── */
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;flex-shrink:0}
.spin-dark{border-color:rgba(0,0,0,.1);border-top-color:var(--accent-d)}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── TOASTS ── */
#toasts{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 15px;border-radius:8px;font-size:12.5px;font-weight:500;box-shadow:var(--sh-md);max-width:320px;display:flex;align-items:center;gap:8px;pointer-events:all;animation:tin .22s ease}
@keyframes tin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-ok{background:#18181B;color:#F8FAFC}
.toast-err{background:var(--err);color:#fff}
.toast-info{background:var(--info);color:#fff}

/* ── AUTH MODAL – warm bakery illustrated background (§3 OptimisedPPv1) ── */
.modal-bg{position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 55% at 50% 108%,rgba(220,138,52,.28) 0%,transparent 65%),
    radial-gradient(ellipse 46% 36% at 7%  90%, rgba(183,112,52,.20) 0%,transparent 58%),
    radial-gradient(ellipse 46% 36% at 93% 88%,rgba(183,112,52,.17) 0%,transparent 58%),
    linear-gradient(175deg,#FDF8EE 0%,#F8EFD8 28%,#EFDDB8 58%,#E2C897 80%,#D2B074 100%);
  display:flex;align-items:center;justify-content:center;z-index:1000}
/* bread silhouettes on the counter */
.modal-bg::before{content:'';position:absolute;bottom:0;left:0;right:0;height:190px;
  background:
    radial-gradient(ellipse 90px 56px  at 10% 102%,rgba(158,92,40,.38) 0%,transparent 100%),
    radial-gradient(ellipse 68px 42px  at 20%  99%,rgba(142,80,35,.30) 0%,transparent 100%),
    radial-gradient(ellipse 74px 46px  at 31% 101%,rgba(150,86,38,.25) 0%,transparent 100%),
    radial-gradient(ellipse 85px 52px  at 72% 102%,rgba(158,92,40,.34) 0%,transparent 100%),
    radial-gradient(ellipse 64px 40px  at 82%  99%,rgba(142,80,35,.27) 0%,transparent 100%),
    radial-gradient(ellipse 54px 34px  at 91% 100%,rgba(136,76,33,.20) 0%,transparent 100%),
    linear-gradient(0deg,rgba(172,106,56,.17) 0%,transparent 42%);
  pointer-events:none}
/* wheat stalk accent */
.modal-bg::after{content:'';position:absolute;bottom:68px;left:50px;width:2px;height:108px;
  background:linear-gradient(180deg,rgba(175,148,58,.58) 0%,rgba(175,148,58,.06) 100%);
  border-radius:2px;
  box-shadow:13px -7px 0 0 rgba(175,148,58,.42),21px -21px 0 -1px rgba(175,148,58,.34),
             9px -43px 0 -1px rgba(175,148,58,.26),-9px -16px 0 0 rgba(175,148,58,.36),
             -17px -34px 0 -1px rgba(175,148,58,.26);
  pointer-events:none}
.modal-box{background:rgba(255,252,244,.97);backdrop-filter:blur(14px);border-radius:16px;
  padding:38px 36px;width:420px;
  box-shadow:0 28px 72px rgba(152,96,36,.18),0 0 0 1px rgba(198,152,96,.20);
  border:1px solid rgba(210,165,106,.25);position:relative;z-index:1}
.modal-center{text-align:center;margin-bottom:28px}
.modal-bmark{width:54px;height:54px;background:linear-gradient(135deg,#E8951A,#A85C0A);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.modal-title{font-size:21px;font-weight:700;color:#3A1F08;letter-spacing:-.4px}
.modal-sub{font-size:13px;color:#8B5E30;margin-top:5px;line-height:1.5}
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.role-opt{border:2px solid var(--border);border-radius:8px;padding:11px 8px;text-align:center;cursor:pointer;transition:all .15s}
.role-opt:hover{border-color:#CBD5E1}
.role-opt.sel{border-color:var(--accent-d);background:#FFFBEB}
.role-opt .r-icon{margin-bottom:5px}
.role-opt .r-icon svg{width:18px;height:18px;color:var(--muted)}
.role-opt.sel .r-icon svg{color:var(--accent-d)}
.role-name{font-size:12px;font-weight:600;color:var(--text);text-transform:capitalize}
.role-desc{font-size:10.5px;color:var(--muted);margin-top:1px}
.auth-footer{margin-top:14px;font-size:12px;color:var(--muted);text-align:center}
.auth-footer span{color:var(--accent-d);font-weight:600}

/* ── GAUGE ── */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.gauge-lbl{font-size:11.5px;font-weight:600;color:var(--muted)}

/* ── RESULT PANEL ── */
.result-block{margin-top:18px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface)}
.info-box{padding:12px 14px;border-radius:7px;font-size:12.5px;line-height:1.5}
.info-ok{background:var(--ok-bg);border:1px solid var(--ok-br);color:var(--ok)}
.info-err{background:var(--err-bg);border:1px solid var(--err-br);color:var(--err)}
.info-warn{background:var(--warn-bg);border:1px solid var(--warn-br);color:var(--warn)}
.info-info{background:var(--info-bg);border:1px solid var(--info-br);color:var(--info)}
.empty-state{padding:36px;text-align:center;color:var(--muted)}
.empty-state svg{width:30px;height:30px;margin:0 auto 10px;display:block;color:var(--faint)}
.empty-state p{font-size:13px}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ AUTH MODAL -->
<div class="modal-bg" id="auth-modal">
  <div class="modal-box">
    <div class="modal-center">
      <div class="modal-bmark">🧁</div>
      <div class="modal-title">BakeManage</div>
      <div class="modal-sub">Sign in to your ERP platform.<br>Select your role and enter your PIN.</div>
    </div>

    <div class="form-group">
      <label class="form-label">Access Role</label>
      <div class="role-grid" id="role-grid">
        <div class="role-opt sel" data-role="owner" onclick="selectRole('owner')">
          <div class="r-icon"><i data-lucide="crown"></i></div>
          <div class="role-name">Owner</div>
          <div class="role-desc">Full access</div>
        </div>
        <div class="role-opt" data-role="operations" onclick="selectRole('operations')">
          <div class="r-icon"><i data-lucide="settings-2"></i></div>
          <div class="role-name">Operations</div>
          <div class="role-desc">Ops & inventory</div>
        </div>
        <div class="role-opt" data-role="auditor" onclick="selectRole('auditor')">
          <div class="r-icon"><i data-lucide="file-search"></i></div>
          <div class="role-name">Auditor</div>
          <div class="role-desc">Read-only view</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">PIN <span class="form-hint">(sandbox default: sandbox1234)</span></label>
      <input class="form-input" id="auth-pin" type="password" placeholder="Enter your PIN" autocomplete="off">
    </div>

    <button class="btn btn-primary btn-full btn-lg" onclick="submitAuth()" id="btn-auth">
      <i data-lucide="log-in"></i> Sign In
    </button>
    <div class="auth-footer">Sandbox environment — PIN: <span>sandbox1234</span></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ APP SHELL -->
<div id="app" style="display:none">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-brand">
        <div class="sb-icon">BM</div>
        <div>
          <div class="sb-name">BakeManage</div>
          <div class="sb-ver">ERP Platform v1.5.0</div>
        </div>
      </div>
    </div>
    <div class="sb-nav" id="sidebar-nav"></div>
    <div class="sb-footer">
      <div class="user-pill" title="Click to sign out" onclick="signOut()">
        <div class="avatar" id="user-avatar">O</div>
        <div class="user-info">
          <div class="user-role" id="user-role">owner</div>
          <div class="user-sub">Click to sign out</div>
        </div>
        <div class="signout-btn"><i data-lucide="log-out" style="width:14px;height:14px;"></i></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div class="header">
      <div class="breadcrumb">
        <span class="bc-root">BakeManage</span>
        <span class="bc-sep">/</span>

let _selRole = 'owner';

function selectRole(r) {
  _selRole = r;
  document.querySelectorAll('.role-opt').forEach(el =>
    el.classList.toggle('sel', el.dataset.role === r));
}

function saveAuth(role, pin) {
  S.role = role; S.pin = pin;
  sessionStorage.setItem('bm', JSON.stringify({ role, pin }));
}

function loadAuth() {
  const d = sessionStorage.getItem('bm');
  if (!d) return false;
  const { role, pin } = JSON.parse(d);
  S.role = role; S.pin = pin;
  return true;
}

function submitAuth() {
  const pin = document.getElementById('auth-pin').value.trim();
  if (!pin) { toast('Enter your PIN', 'err'); return; }
  saveAuth(_selRole, pin);
  document.getElementById('auth-modal').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}

function signOut() {
  sessionStorage.removeItem('bm');
  S.role = null; S.pin = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-modal').style.display = 'flex';
  selectRole('owner');
  document.getElementById('auth-pin').value = '';
}

/* ════════════════════════════════════
   API HELPERS
════════════════════════════════════ */
function hdrs(json = true) {
  const h = { 'X-Client-Role': S.role, 'X-Client-PIN': S.pin };
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

async function GET(path) {
  const r = await fetch(`/api${path}`, { headers: hdrs(false) });
  if (!r.ok) throw new Error(`${r.status} — ${await r.text()}`);
  return r.json();
}

async function POST(path, data) {
  const r = await fetch(`/api${path}`, { method: 'POST', headers: hdrs(), body: JSON.stringify(data) });
  if (!r.ok) throw new Error(`${r.status} — ${await r.text()}`);
  return r.json();
}

async function POSTF(path, fd) {
  const r = await fetch(`/api${path}`, { method: 'POST', headers: hdrs(false), body: fd });
  if (!r.ok) throw new Error(`${r.status} — ${await r.text()}`);
  return r.json();
}

/* ════════════════════════════════════
   TOASTS
════════════════════════════════════ */
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icon = type === 'ok' ? '✓' : type === 'err' ? '✗' : 'ℹ';
  el.innerHTML = `<span style="font-size:14px;">${icon}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .25s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 260); }, 3600);
}

/* ════════════════════════════════════
   LOADING STATE
════════════════════════════════════ */
function setLoad(btn, on) {
  if (!btn) return;
  if (on) { btn._orig = btn.innerHTML; btn.innerHTML = `<span class="spin"></span> Loading…`; btn.disabled = true; }
  else { btn.innerHTML = btn._orig; btn.disabled = false; }
}

/* ════════════════════════════════════
   SIDEBAR + NAVIGATION
════════════════════════════════════ */
function buildSidebar() {
  let html = '', sec = null;
  for (const n of NAV) {
    if (n.sec !== sec) { html += `<div class="sb-sec">${n.sec}</div>`; sec = n.sec; }
    const locked = n.ownerOnly && S.role !== 'owner';
    const active = n.id === S.view ? 'active' : '';
    const dim    = locked ? 'opacity:.42;' : '';
    const lock   = locked ? `<i data-lucide="lock" style="width:10px;height:10px;margin-left:auto;opacity:.5;"></i>` : '';
    html += `<div class="nav-item ${active}" onclick="nav('${n.id}')" style="${dim}">
      <i data-lucide="${n.icon}"></i><span>${n.label}</span>${lock}</div>`;
  }
  document.getElementById('sidebar-nav').innerHTML = html;
  lucide.createIcons();
}

function nav(view) {
  const item = NAV.find(n => n.id === view);
  // Owner-only guard — show toast and abort navigation
  if (item && item.ownerOnly && S.role !== 'owner') {
    toast('This section requires owner access', 'err');
    return;
  }
  S.view = view;
  buildSidebar();
  document.getElementById('bc-curr').textContent = item ? item.label : view;
  renderView(view);
}

async function _loadDashboardData() {
  // 1. Basic health
  try {
    const h = await GET('/health');
    const ok = h.status === 'ok';
    const set = (id, val) => { const e = document.getElementById(id); if (e) e[typeof val === 'string' ? 'textContent' : 'style'] = val; };
    const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    const setS = (id, prop, v) => { const e = document.getElementById(id); if (e) e.style[prop] = v; };
    setT('d-api-val', ok ? 'Online ✓' : 'Degraded');
    setS('d-api-val', 'color', ok ? 'var(--ok)' : 'var(--err)');
    ['d-dot-api','d-dot-db','d-dot-cel'].forEach(id => setS(id, 'background', ok ? 'var(--ok)' : '#94A3B8'));
    setT('d-api-sub', ok ? 'Operational' : 'Degraded');
    const badge = document.getElementById('d-status-badge');
    if (badge) { badge.textContent = ok ? 'All Systems Go' : 'Degraded'; badge.className = `badge badge-${ok ? 'ok' : 'err'}`; }
  } catch {
    const e = document.getElementById('d-api-val'); if (e) { e.textContent = 'Offline'; e.style.color = 'var(--err)'; }
    const b = document.getElementById('d-status-badge'); if (b) { b.textContent = 'API Offline'; b.className = 'badge badge-err'; }
  }
  // 2. DB-backed KPIs from /dashboard/summary
  try {
    const s = await GET('/dashboard/summary');
    const setKpi = (id, val, hint, hintId) => {
      const e = document.getElementById(id); if (e) e.textContent = val;
      const h = document.getElementById(hintId); if (h) h.textContent = hint;
    };
    const qRate = s.quality_pass_rate != null ? `${s.quality_pass_rate}%` : '—';
    const qHint = s.quality_inspections ? `${s.quality_inspections} inspection${s.quality_inspections !== 1 ? 's' : ''} logged` : 'No inspections yet';
    setKpi('d-quality', qRate, qHint, 'd-quality-hint');
    const stHint = s.stock_items ? `${s.stock_items} line item${s.stock_items !== 1 ? 's' : ''} on record` : 'Inject invoices to populate';
    setKpi('d-stock', s.stock_items ?? '0', stHint, 'd-stock-hint');
    const prHint = s.proofing_readings ? `${s.proofing_readings} reading${s.proofing_readings !== 1 ? 's' : ''} logged` : 'Submit proofing readings to populate';
    setKpi('d-proofing', s.proofing_readings ?? '0', prHint, 'd-proofing-hint');
  } catch {
    ['d-quality','d-stock','d-proofing'].forEach(id => { const e = document.getElementById(id); if (e) e.textContent = '—'; });
  }
  // 3. Golden signals from extended health
  try {
    const ext = await GET('/health/extended');
    const gs = ext.golden_signals || {};
    const sig = document.getElementById('d-signals');
    if (sig) {
      sig.innerHTML = [
        { k:'Latency',    v:`${gs.latency_ms_p50 ?? '—'} ms`,              cls: (gs.latency_ms_p50 ?? 0) < 150 ? 'ok' : 'warn' },
        { k:'Traffic',    v:`${gs.traffic_rps ?? '—'} rps`,                cls: 'ok' },
        { k:'Error Rate', v:`${(((gs.error_rate || 0)*100).toFixed(1))}%`, cls: (gs.error_rate || 0) < 0.05 ? 'ok' : 'err' },
        { k:'Saturation', v:`${(((gs.saturation || 0)*100).toFixed(0))}%`, cls: (gs.saturation || 0) < 0.8 ? 'ok' : 'warn' },
      ].map(({ k, v, cls }) => `
        <div style="padding:10px;border:1px solid var(--border);border-radius:7px;text-align:center;">
          <div style="font-size:14px;font-weight:700;color:var(--${cls === 'ok' ? 'ok' : cls === 'warn' ? 'warn' : 'err'});">${v}</div>
          <div style="font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;">${k}</div>
        </div>`).join('');
    }
  } catch {}
}

function ingTab(t) {
  document.getElementById('tab-img').classList.toggle('active', t === 'img');
  document.getElementById('tab-doc').classList.toggle('active', t === 'doc');
  document.getElementById('ing-img-panel').style.display = t === 'img' ? '' : 'none';
  document.getElementById('ing-doc-panel').style.display = t === 'doc' ? '' : 'none';
  document.getElementById('ing-result').innerHTML = '';
}

function setupDZ(id, handler) {
  const z = document.getElementById(id);
  if (!z) return;
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drag-over'); });
  z.addEventListener('dragleave', () => z.classList.remove('drag-over'));
  z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handler(f); });
}

function onImgSel(e) {
  const f = e.target ? e.target.files[0] : e; if (!f) return;
  _imgFile = f;
  document.getElementById('btn-ing-img').disabled = false;
  const w = document.getElementById('img-prev-wrap'); w.style.display = '';
  document.getElementById('img-prev').src = URL.createObjectURL(f);
  document.getElementById('img-fname').textContent = f.name;
}

function onDocSel(e) {
  const f = e.target ? e.target.files[0] : e; if (!f) return;
  _docFile = f;
  document.getElementById('btn-ing-doc').disabled = false;
  const lbl = document.getElementById('doc-fname'); lbl.style.display = ''; lbl.textContent = `📄 ${f.name}`;
}

async function doIngImg() {

function renderCostRows() {
  const el = document.getElementById('cost-rows'); if (!el) return;
  el.innerHTML = _rows.map((r, i) => `
    <div style="display:grid;grid-template-columns:1fr 90px 90px 34px;gap:8px;margin-bottom:8px;align-items:center;">
      <input class="form-input" value="${r.name}" oninput="_rows[${i}].name=this.value" placeholder="e.g. Flour">
      <input class="form-input" type="number" value="${r.cost}" min="0" step="0.5" oninput="_rows[${i}].cost=+this.value">
      <input class="form-input" type="number" value="${r.yp}" min="0.01" max="1" step="0.05" oninput="_rows[${i}].yp=+this.value">
      <button class="btn btn-ghost btn-sm" onclick="removeCostRow(${i})" style="padding:0;width:34px;" ${_rows.length<2?'disabled':''}>

      </button>
    </div>`).join('');

}

function addCostRow() { _rows.push({ name:'', cost:5, yp:1 }); renderCostRows(); }
function removeCostRow(i) { _rows.splice(i,1); renderCostRows(); }

async function doComputeCost() {
  const btn = document.getElementById('btn-cost'); setLoad(btn, true);
  try {
    const payload = {
      components: _rows.map(r => ({ name: r.name, cost: r.cost, yield_percent: r.yp })),
      overhead: +document.getElementById('c-overhead').value || 0,
      selling_price: +document.getElementById('c-selling').value || null,
    };
    const data = await POST('/cost/compute', payload);
    renderCostResult(data); toast('Cost computed');
  } catch(e) { toast(e.message, 'err'); } finally { setLoad(btn, false); }
}

function renderCostResult(d) {
  const margin = parseFloat(d.margin_percent) || 0;
  const pct = Math.min(Math.max(margin, 0), 100);
  const cls = margin >= 20 ? 'ok' : margin >= 10 ? 'warn' : 'err';
  const barCls = margin >= 20 ? 'prog-green' : margin >= 10 ? 'prog-amber' : 'prog-red';
  const label = margin >= 20 ? 'Healthy Margin' : margin >= 10 ? 'Tight Margin' : 'At Risk';
  document.getElementById('cost-result').innerHTML = `
    <div class="card">
      <div class="card-hd"><div class="card-title">Results</div><span class="badge badge-${cls}">${label}</span></div>
      <div class="card-bd">
        <div class="kv"><span class="kv-key">Total Cost</span><span class="kv-val" style="font-size:20px;letter-spacing:-.5px;">₹${d.total_cost}</span></div>
        ${d.margin_percent != null ? `
          <div style="margin-top:14px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:12px;font-weight:600;color:var(--muted);">Profit Margin</span>
              <span style="font-size:14px;font-weight:700;color:var(--${cls});">${margin}%</span>
            </div>
            <div class="prog-bg"><div class="prog-fill ${barCls}" style="width:${pct}%"></div></div>
            <div style="font-size:11.5px;color:var(--muted);margin-top:7px;">${d.margin_warning ? '⚠ Below 20% safe threshold — review pricing or reduce costs.' : '✓ Margin within healthy operating range.'}</div>
          </div>` : ''}
      </div>
    </div>`;
}

function onQSel(e) {
  const f = e.target ? e.target.files[0] : e; if (!f) return;
  _qFile = f;
  document.getElementById('btn-qual').disabled = false;
  const w = document.getElementById('q-prev-wrap'); w.style.display = '';
  document.getElementById('q-prev').src = URL.createObjectURL(f);
}

async function doQuality() {
  if (!_qFile) return;
  const btn = document.getElementById('btn-qual'); setLoad(btn, true);
  try {
    const fd = new FormData(); fd.append('file', _qFile);
    const data = await POSTF('/quality/validate', fd);
    renderQResult(data); toast('Analysis complete');
  } catch(e) { toast(e.message,'err'); } finally { setLoad(btn,false); }
}

function renderQResult(data) {
  const q = data.quality || data;
  const browning = +(q.browning_score || 0);
  const uniformity = +(q.uniformity_score || 0);
  const isOK = q.verdict === 'optimal';
  const C = 2 * Math.PI * 42;
  const offset = C * (1 - browning / 100);
  const gc = browning >= 40 && browning <= 78 ? '#059669' : browning < 40 ? '#2563EB' : '#DC2626';

  document.getElementById('q-result').innerHTML = `
    <div class="card">
      <div class="card-hd">
        <div><div class="card-title">Analysis Results</div><div class="card-sub">SHA-256 fingerprint stored in DB</div></div>
        <span class="badge badge-${isOK ? 'ok' : 'err'}" style="font-size:12px;padding:4px 12px;">
          ${isOK ? '✓ OPTIMAL' : '⚠ ADJUST BATCH'}
        </span>
      </div>
      <div class="card-bd" style="display:flex;flex-direction:column;align-items:center;gap:18px;">
        <div class="gauge-wrap">
          <svg width="128" height="128" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border)" stroke-width="9"/>
            <circle cx="50" cy="50" r="42" fill="none" stroke="${gc}" stroke-width="9"
              stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
              stroke-linecap="round" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .8s ease"/>
            <text x="50" y="45" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A" font-family="Inter,sans-serif">${browning}</text>
            <text x="50" y="60" text-anchor="middle" font-size="9" fill="#64748B" font-family="Inter,sans-serif">/ 100</text>
          </svg>
          <div class="gauge-lbl">Browning Score</div>
        </div>

        <div style="width:100%;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="font-size:12px;font-weight:600;color:var(--muted);">Uniformity</span>
            <span style="font-size:13px;font-weight:700;">${uniformity}%</span>
          </div>
          <div class="prog-bg"><div class="prog-fill ${uniformity>=60?'prog-green':'prog-amber'}" style="width:${uniformity}%"></div></div>
        </div>

        <div style="width:100%;padding:13px;border-radius:8px;text-align:center;
          background:${isOK?'var(--ok-bg)':'var(--err-bg)'};
          border:1px solid ${isOK?'var(--ok-br)':'var(--err-br)'};">
          <div style="font-size:13px;font-weight:600;color:${isOK?'var(--ok)':'var(--err)'};">
            ${isOK
              ? '✓ Browning is within optimal range (40–78). Batch approved.'
              : `Browning ${browning < 40 ? 'too low – increase time or temperature' : 'too high – reduce baking duration'}. Review batch.`}
          </div>
        </div>
      </div>
    </div>`;
}

async function doHealthCheck() {

    const lbl = document.getElementById('h-label');
    if (lbl) lbl.textContent = ok ? 'All Systems Operational' : 'Service Degraded';
    const badges = document.getElementById('h-badges');
    if (badges) badges.innerHTML = `
      <span class="badge badge-${ok?'ok':'err'}">API ${ok?'Online':'Offline'}</span>

      <span class="badge badge-ok">Redis Healthy</span>
      <span class="badge badge-ok">Celery Worker Active</span>`;

    const lbl = document.getElementById('h-label');
    if (lbl) { lbl.textContent = 'Unreachable'; document.getElementById('h-dot').style.background = 'var(--err)'; }
  }
}

function stkTab(active) {
  ['stk-tab-list','stk-tab-add','stk-tab-expiry'].forEach(id => {
    const btn = document.getElementById(id);
    const panel = document.getElementById(id.replace('stk-tab-','stk-panel-'));
    if (!btn) return;
    if (id === active) { btn.className = 'btn btn-primary'; if (panel) panel.style.display = ''; }
    else { btn.className = 'btn btn-outline'; if (panel) panel.style.display = 'none'; }
  });
  if (active === 'stk-tab-expiry') _stkLoadExpiry();
}

async function _stkLoadSummary() {
  try {
    const d = await GET('/stock/items');
    const t = document.getElementById('stk-total'); if (t) t.textContent = d.total;
    const e = document.getElementById('stk-exp7'); if (e) e.textContent = d.expiring_soon;
  } catch {}
}

async function _stkLoadList() {
  const body = document.getElementById('stk-list-body');
  if (!body) return;
  body.innerHTML = `<div class="empty-state"><i data-lucide="loader"></i><p>Loading…</p></div>`;
  lucide.createIcons();
  try {
    const d = await GET('/stock/items');
    if (!d.items || !d.items.length) {
      body.innerHTML = `<div class="empty-state"><i data-lucide="inbox"></i><p>No stock items. Add items manually or inject invoices.</p></div>`;
      lucide.createIcons(); return;
    }
    body.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Category</th><th>Unit Price</th><th>Expires</th><th>Days Left</th></tr></thead>
      <tbody>${d.items.map(it => {
        const urgency = it.days_until_expiry !== null && it.days_until_expiry !== undefined
          ? (it.days_until_expiry <= 3 ? 'color:var(--err);font-weight:700;' : it.days_until_expiry <= 7 ? 'color:#d97706;font-weight:600;' : '')
          : '';
        return `<tr>
          <td style="font-weight:600;">${it.name}</td>
          <td>${parseFloat(it.quantity_on_hand).toFixed(2)}</td>
          <td>${it.unit_of_measure}</td>
          <td><span class="badge badge-neutral">${it.category}</span></td>
          <td>₹${parseFloat(it.unit_price).toFixed(2)}</td>
          <td>${it.expiration_date || '—'}</td>
          <td style="${urgency}">${it.days_until_expiry !== null && it.days_until_expiry !== undefined ? it.days_until_expiry + 'd' : '—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
    lucide.createIcons();
  } catch(e) {
    body.innerHTML = `<div class="info-box info-warn">Could not load inventory: ${e.message}</div>`;
  }
}

async function doAddStock() {
  const name = document.getElementById('stk-name').value.trim();
  const qty = parseFloat(document.getElementById('stk-qty').value);
  const unit = document.getElementById('stk-unit').value;
  const cat = document.getElementById('stk-cat').value;
  const price = parseFloat(document.getElementById('stk-price').value) || 0;
  const expDate = document.getElementById('stk-exp').value || null;

  if (!name) { toast('Item name is required', 'err'); return; }
  if (isNaN(qty) || qty < 0) { toast('Valid quantity required', 'err'); return; }

  const btn = document.getElementById('btn-stk-add'); setLoad(btn, true);
  try {
    const data = await POST('/stock/add', { name, quantity_on_hand: qty, unit_of_measure: unit, category: cat, unit_price: price, expiration_date: expDate });
    document.getElementById('stk-add-result').innerHTML = `
      <div class="card">
        <div class="card-hd"><div class="card-title">Added</div><span class="badge badge-ok">Success</span></div>
        <div class="card-bd" style="padding:12px 16px;">
          <div class="kv"><span class="kv-key">ID</span><span class="kv-val">#${data.id}</span></div>
          <div class="kv"><span class="kv-key">Name</span><span class="kv-val">${data.name}</span></div>
          <div class="kv"><span class="kv-key">Qty</span><span class="kv-val">${data.quantity_on_hand} ${data.unit_of_measure || ''}</span></div>
          <div class="kv"><span class="kv-key">Expires</span><span class="kv-val">${data.expiration_date || '—'}</span></div>
        </div>
      </div>`;
    ['stk-name','stk-qty','stk-price','stk-exp'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
    _stkLoadSummary();
    toast('Stock item added');
  } catch(e) { toast(e.message,'err'); } finally { setLoad(btn,false); }
}

async function _stkLoadExpiry() {
  const body = document.getElementById('stk-exp-body');
  if (!body) return;
  body.innerHTML = `<div class="empty-state"><i data-lucide="loader"></i><p>Loading…</p></div>`;

async function _loadSystemStatus() {
  try {
    const d = await GET('/system/status');
    // Resources
    ['cpu_pct','ram_pct','disk_pct'].forEach(k => {
      const v = d.resources[k];
      const el = document.getElementById('sm-' + k);
      const bar = document.getElementById('sm-bar-' + k);
      if (el) el.textContent = v + '%';
      if (bar) { bar.style.width = v + '%'; bar.style.background = v > 80 ? 'var(--err)' : v > 60 ? '#f59e0b' : 'var(--primary)'; }
    });

    // Services
    const svcEl = document.getElementById('sm-services');
    if (svcEl) svcEl.innerHTML = d.services.map(s => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:13px;font-weight:500;">${s.name}</span>
        <span class="badge badge-ok">
          <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:5px;"></span>${s.status}
        </span>
      </div>`).join('');

    // Queue + AI
    const qEl = document.getElementById('sm-queue');
    if (qEl) qEl.innerHTML = `
      <div class="kv"><span class="kv-key">Queue Depth</span><span class="kv-val">${d.queue.depth} tasks</span></div>
      <div class="kv"><span class="kv-key">Latency (P50)</span><span class="kv-val">${d.queue.latency_ms} ms</span></div>
      <div class="kv"><span class="kv-key">AI Tokens Used</span><span class="kv-val">${d.ai_usage.tokens_used_session.toLocaleString()}</span></div>
      <div class="kv"><span class="kv-key">OCR Jobs Run</span><span class="kv-val">${d.ai_usage.ocr_jobs_run}</span></div>`;

    // DB counts
    const dbEl = document.getElementById('sm-db');
    if (dbEl) {
      const counts = d.db_record_counts;
      dbEl.innerHTML = Object.entries({
        'Stock Items': counts.stock_items,
        'Quality Inspections': counts.quality_inspections,
        'Quality Passed': counts.quality_pass,
        'Proofing Readings': counts.proofing_readings,
        'Service Credentials': counts.service_credentials,
      }).map(([k,v]) => `<div class="kv"><span class="kv-key">${k}</span><span class="kv-val">${v}</span></div>`).join('');
    }
  } catch(e) { toast('System status unavailable: ' + e.message, 'err'); }
}

async function smDiagnostics() {
  const btn = document.getElementById('btn-sm-diag'); setLoad(btn, true);
  try {
    const data = await GET('/health/metrics');
    document.getElementById('sm-diag-result').innerHTML = `
      <div class="info-box info-ok" style="font-size:12.5px;">
        Task queued — ID: <code>${data.task_id}</code>
      </div>`;
    toast('Diagnostics queued');
  } catch(e) { toast(e.message,'err'); } finally { setLoad(btn,false); }
}

function aaTab(active) {
  ['aa-tab-roles','aa-tab-tokens','aa-tab-vault','aa-tab-users'].forEach(id => {
    const btn = document.getElementById(id);
    const panel = document.getElementById(id.replace('aa-tab-','aa-panel-'));
    if (!btn) return;
    if (id === active) {
      btn.className = 'btn btn-primary'; if (panel) panel.style.display = '';
    } else {
      btn.className = 'btn btn-outline'; if (panel) panel.style.display = 'none';
    }
  });
}
