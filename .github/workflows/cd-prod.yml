name: CD — Production

on:
  push:
    branches: [main]

env:
  PROJECT_ID: bakemanage
  REGION: asia-south1
  REGISTRY: asia-south1-docker.pkg.dev/bakemanage/api
  SERVICE_NAME: bakemanage-api-prod
  PROD_URL: https://api.bakemanage.in

jobs:
  build-and-deploy-prod:
    name: Build, Push & Deploy to Production
    runs-on: ubuntu-latest
    environment: production  # requires manual approval in GitHub Environments
    permissions:
      contents: write        # for creating GitHub Release
      id-token: write        # OIDC for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for changelog generation

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}:prod-latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}:prod-latest

      - name: Record previous image tag for rollback
        id: prev_image
        run: |
          PREV=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format "value(spec.template.spec.containers[0].image)" 2>/dev/null || echo "")
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run Production
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}:${{ github.sha }}
          env_vars: |
            ENVIRONMENT=production
            ENFORCE_HTTPS=true
          secrets: |
            DATABASE_URL=bakemanage-prod-db-url:latest
            JWT_SECRET=bakemanage-prod-jwt-secret:latest
            BOOTSTRAP_PIN=bakemanage-prod-bootstrap-pin:latest
            DEFAULT_ADMIN_PIN=bakemanage-prod-admin-pin:latest
            REDIS_URL=bakemanage-prod-redis-url:latest
            CELERY_BROKER_URL=bakemanage-prod-redis-url:latest
            CELERY_RESULT_BACKEND=bakemanage-prod-redis-url:latest

      - name: Health check — production
        id: health_check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" ${{ env.PROD_URL }}/health/extended || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 10s"
            sleep 10
          done
          echo "❌ Production health check failed"
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.health_check.outcome == 'failure' && steps.prev_image.outputs.tag != ''
        run: |
          echo "⏪ Rolling back to ${{ steps.prev_image.outputs.tag }}"
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --image "${{ steps.prev_image.outputs.tag }}"
          echo "✅ Rollback complete"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges -20)
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${new Date().toISOString().slice(0,10).replace(/-/g,'.')}.${context.runNumber}`;
            const changelog = `${{ steps.changelog.outputs.log }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## Changes\n\n${changelog}\n\n**Image:** \`${{ env.REGISTRY }}:${{ github.sha }}\``,
              draft: false,
              prerelease: false,
            });
