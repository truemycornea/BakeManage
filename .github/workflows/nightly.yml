name: Nightly — DB Integrity & Load Tests

on:
  schedule:
    - cron: "0 1 * * *"  # 01:00 UTC = 06:30 IST
  workflow_dispatch:       # allow manual trigger

env:
  STAGING_URL: https://staging-api.bakemanage.in

jobs:
  nightly-integrity:
    name: Integrity Tests & Coverage Trend
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for committing coverage trend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bakemanage
          POSTGRES_PASSWORD: bakemanage
          POSTGRES_DB: bakemanage
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://bakemanage:bakemanage@localhost:5432/bakemanage
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: development
      ENFORCE_HTTPS: "false"
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DEFAULT_ADMIN_PIN: ${{ secrets.DEFAULT_ADMIN_PIN || '123456' }}
      BOOTSTRAP_PIN: ${{ secrets.BOOTSTRAP_PIN || '123456' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integrity & slow tests
        run: |
          pytest tests/ -v -m "slow or integrity" --cov=app --cov-report=json \
            --ignore=tests/test_india_comprehensive.py || true

      - name: Generate coverage trend
        run: |
          python - <<'PYEOF'
          import json, os, datetime

          trend_file = "docs/coverage-trend.json"
          os.makedirs("docs", exist_ok=True)

          # Load existing trend or start fresh
          if os.path.exists(trend_file):
              with open(trend_file) as f:
                  trend = json.load(f)
          else:
              trend = []

          # Parse latest coverage report
          cov_file = "coverage.json"
          if os.path.exists(cov_file):
              with open(cov_file) as f:
                  cov = json.load(f)
              pct = round(cov.get("totals", {}).get("percent_covered", 0), 1)
          else:
              pct = None

          trend.append({
              "date": datetime.date.today().isoformat(),
              "run": os.environ.get("GITHUB_RUN_NUMBER", "local"),
              "coverage_pct": pct,
          })

          # Keep last 90 data points
          trend = trend[-90:]
          with open(trend_file, "w") as f:
              json.dump(trend, f, indent=2)
          print(f"Coverage trend updated: {pct}%")
          PYEOF

      - name: Commit coverage trend
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'docs/coverage-trend.json';
            if (!fs.existsSync(path)) {
              console.log('No coverage-trend.json to commit');
              return;
            }
            const content = fs.readFileSync(path, 'utf8');
            const encoded = Buffer.from(content).toString('base64');
            let sha;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: context.ref,
              });
              sha = existing.data.sha;
            } catch {
              sha = undefined;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: `chore(nightly): update coverage trend [skip ci]`,
              content: encoded,
              sha,
            });

  load-test:
    name: Locust Load Test (Staging)
    runs-on: ubuntu-latest
    needs: nightly-integrity
    permissions:
      contents: read
    continue-on-error: true  # don't fail nightly if staging is down

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Locust
        run: pip install locust==2.32.2

      - name: Create Locust file
        run: |
          cat > /tmp/locustfile.py <<'EOF'
          from locust import HttpUser, task, between

          class BakeManageUser(HttpUser):
              wait_time = between(0.5, 1.5)
              host = "${{ env.STAGING_URL }}"

              @task(3)
              def health(self):
                  self.client.get("/health")

              @task(2)
              def extended_health(self):
                  self.client.get("/health/extended")

              @task(1)
              def dashboard(self):
                  self.client.get(
                      "/dashboard/summary",
                      headers={"X-Client-Role": "owner", "X-Client-PIN": "123456"},
                  )
          EOF

      - name: Run Locust headless (60s, 50 users)
        run: |
          locust -f /tmp/locustfile.py \
            --headless \
            --users 50 \
            --spawn-rate 10 \
            --run-time 60s \
            --host ${{ env.STAGING_URL }} \
            --csv /tmp/locust_results \
            --html /tmp/locust_report.html \
            --exit-code-on-error 0 || true

      - name: Check p95 latency threshold (< 500ms)
        run: |
          python - <<'PYEOF'
          import csv, sys

          stats_file = "/tmp/locust_results_stats.csv"
          try:
              with open(stats_file) as f:
                  rows = list(csv.DictReader(f))
          except FileNotFoundError:
              print("No Locust stats file — staging may be unavailable. Skipping.")
              sys.exit(0)

          failed = []
          for row in rows:
              name = row.get("Name", "")
              p95 = float(row.get("95%", 0) or 0)
              if name == "Aggregated":
                  print(f"Aggregated p95 latency: {p95}ms")
                  if p95 > 500:
                      failed.append(f"{name}: p95={p95}ms > 500ms threshold")

          if failed:
              print("FAIL: p95 latency threshold exceeded:")
              for f in failed:
                  print(f"  {f}")
              sys.exit(1)
          else:
              print("PASS: p95 latency within 500ms threshold")
          PYEOF

      - name: Upload Locust report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-report
          path: /tmp/locust_report.html
          retention-days: 30
