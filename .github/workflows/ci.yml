name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-security:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Secrets scan — detect hardcoded credentials
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          FOUND=$(git grep -rn -P '(password|secret|token|api_key|apikey)\s*=\s*["\x27][^$<{][^"'\'']{2,}["\x27]' \
              -- ':!.env.example' ':!*.md' ':!tests/' ':!app/config.py' 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            FILTERED=$(echo "$FOUND" | grep -v -E 'change-this-secret|your-|placeholder|example|test|fake|mock' || true)
            if [ -n "$FILTERED" ]; then
              echo "FAIL: Potential hardcoded secret detected. Use environment variables instead."
              echo "$FILTERED"
              exit 1
            fi
          fi
          echo "PASS: No hardcoded secrets found."

      - name: Check requirements.txt pins
        run: |
          echo "=== Verifying all dependencies are pinned ==="
          if grep -v '^\s*#' requirements.txt | grep -v '^\s*$' | grep -qv '=='; then
            echo "FAIL: Unpinned dependency detected. All dependencies must use '=='."
            exit 1
          fi
          echo "PASS: All dependencies are pinned."

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-security
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bakemanage
          POSTGRES_PASSWORD: bakemanage
          POSTGRES_DB: bakemanage
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://bakemanage:bakemanage@localhost:5432/bakemanage
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: development
      ENFORCE_HTTPS: "false"
      OLYMPUS_APP_NAME: bakemanage
      # Non-sensitive configuration — plain environment variables.
      JWT_EXPIRY_MINUTES: "30"
      DEFAULT_ADMIN_USERNAME: ${{ vars.DEFAULT_ADMIN_USERNAME || 'admin' }}
      # Sensitive credentials — read from GitHub Secrets with a safe CI default.
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DEFAULT_ADMIN_PIN: ${{ secrets.DEFAULT_ADMIN_PIN || '123456' }}
      BOOTSTRAP_PIN: ${{ secrets.BOOTSTRAP_PIN || '123456' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/test_api_all_phases.py --ignore=tests/test_india_comprehensive.py

      - name: Start API server for integration tests
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid
        env:
          DATABASE_URL: postgresql+psycopg2://bakemanage:bakemanage@localhost:5432/bakemanage

      - name: Wait for API to be ready (healthz)
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/healthz && break || sleep 2
          done

      - name: Run integration tests
        run: pytest tests/test_api_all_phases.py -v

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" || true
          fi
